<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Tank car calculation scheme v0.3.0</title>
  <desc id="desc">Finite-element calculation scheme for a tank car beam model with vertical loads, longitudinal end load, lateral load, bolster supports, tank supports, and center sill.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <marker id="loadArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b42318"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d8dee8; stroke-width: 1.5; }
      .tank { fill: none; stroke: #147c8c; stroke-width: 4; }
      .tankThin { fill: none; stroke: #72b7c2; stroke-width: 2.5; }
      .frame { fill: none; stroke: #283747; stroke-width: 6; stroke-linecap: round; }
      .frameThin { fill: none; stroke: #283747; stroke-width: 3; stroke-linecap: round; }
      .interface { fill: none; stroke: #9a3412; stroke-width: 4; stroke-linecap: round; }
      .support { fill: none; stroke: #111827; stroke-width: 3; }
      .load { fill: none; stroke: #b42318; stroke-width: 3; marker-end: url(#loadArrow); }
      .lateral { fill: none; stroke: #6d28d9; stroke-width: 3; marker-end: url(#loadArrow); }
      .axis { stroke: #4b5563; stroke-width: 2; marker-end: url(#arrow); }
      .node { fill: #ffffff; stroke: #283747; stroke-width: 2; }
      .tankNode { fill: #ffffff; stroke: #147c8c; stroke-width: 2; }
      .label { font: 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .title { font: 24px Arial, sans-serif; font-weight: 700; fill: #111827; }
      .case { font: 16px Arial, sans-serif; font-weight: 700; fill: #111827; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <rect class="panel" x="36" y="34" width="1208" height="650" rx="8"/>

  <text class="title" x="64" y="76">Tank car calculation scheme for beam FEM</text>
  <text class="small" x="64" y="104">Loads, supports, tank-frame interfaces, and result groups for v0.3.0</text>

  <!-- Main side-view tank lattice -->
  <ellipse class="tankThin" cx="635" cy="248" rx="472" ry="122"/>
  <line class="tank" x1="163" y1="248" x2="1107" y2="248"/>
  <line class="tankThin" x1="183" y1="180" x2="1087" y2="180"/>
  <line class="tankThin" x1="183" y1="316" x2="1087" y2="316"/>

  <!-- Ring stations -->
  <g>
    <line class="tankThin" x1="190" y1="129" x2="190" y2="367"/>
    <line class="tankThin" x1="312" y1="125" x2="312" y2="371"/>
    <line class="tankThin" x1="434" y1="124" x2="434" y2="372"/>
    <line class="tankThin" x1="556" y1="123" x2="556" y2="373"/>
    <line class="tankThin" x1="678" y1="123" x2="678" y2="373"/>
    <line class="tankThin" x1="800" y1="124" x2="800" y2="372"/>
    <line class="tankThin" x1="922" y1="125" x2="922" y2="371"/>
    <line class="tankThin" x1="1044" y1="129" x2="1044" y2="367"/>
  </g>

  <!-- Vertical gravity loads -->
  <g>
    <line class="load" x1="190" y1="96" x2="190" y2="158"/>
    <line class="load" x1="312" y1="96" x2="312" y2="158"/>
    <line class="load" x1="434" y1="96" x2="434" y2="158"/>
    <line class="load" x1="556" y1="96" x2="556" y2="158"/>
    <line class="load" x1="678" y1="96" x2="678" y2="158"/>
    <line class="load" x1="800" y1="96" x2="800" y2="158"/>
    <line class="load" x1="922" y1="96" x2="922" y2="158"/>
    <line class="load" x1="1044" y1="96" x2="1044" y2="158"/>
  </g>
  <text class="case" x="238" y="88">LC1, LC2: tare and payload vertical loads</text>

  <!-- Underframe -->
  <line class="frame" x1="98" y1="442" x2="1172" y2="442"/>
  <line class="frameThin" x1="98" y1="406" x2="1172" y2="406"/>
  <line class="frameThin" x1="98" y1="478" x2="1172" y2="478"/>
  <line class="frame" x1="220" y1="390" x2="220" y2="494"/>
  <line class="frame" x1="1050" y1="390" x2="1050" y2="494"/>
  <line class="frameThin" x1="98" y1="390" x2="98" y2="494"/>
  <line class="frameThin" x1="1172" y1="390" x2="1172" y2="494"/>
  <line class="frameThin" x1="428" y1="406" x2="428" y2="478"/>
  <line class="frameThin" x1="635" y1="406" x2="635" y2="478"/>
  <line class="frameThin" x1="842" y1="406" x2="842" y2="478"/>

  <!-- Tank-frame interfaces -->
  <line class="interface" x1="220" y1="328" x2="220" y2="406"/>
  <line class="interface" x1="1050" y1="328" x2="1050" y2="406"/>
  <line class="interface" x1="635" y1="328" x2="635" y2="442"/>
  <line class="interface" x1="195" y1="314" x2="220" y2="406"/>
  <line class="interface" x1="245" y1="314" x2="220" y2="406"/>
  <line class="interface" x1="1025" y1="314" x2="1050" y2="406"/>
  <line class="interface" x1="1075" y1="314" x2="1050" y2="406"/>

  <!-- Longitudinal load -->
  <line class="load" x1="42" y1="442" x2="92" y2="442"/>
  <text class="case" x="64" y="532">LC3, LC4: longitudinal compression or tension through draft gear and center sill</text>

  <!-- Lateral load symbol -->
  <line class="lateral" x1="1110" y1="250" x2="1170" y2="250"/>
  <text class="case" x="842" y="220">LC5: lateral inertia on tank lattice</text>

  <!-- Supports -->
  <g>
    <path class="support" d="M 196 514 L 244 514 L 220 478 z"/>
    <path class="support" d="M 1026 514 L 1074 514 L 1050 478 z"/>
    <line class="support" x1="180" y1="514" x2="260" y2="514"/>
    <line class="support" x1="1010" y1="514" x2="1090" y2="514"/>
    <line class="support" x1="190" y1="526" x2="250" y2="526"/>
    <line class="support" x1="1020" y1="526" x2="1080" y2="526"/>
  </g>
  <text class="label" x="172" y="554">S1, S2</text>
  <text class="label" x="1002" y="554">S3, S4</text>

  <!-- Nodes -->
  <g>
    <circle class="node" cx="98" cy="442" r="5"/>
    <circle class="node" cx="220" cy="442" r="5"/>
    <circle class="node" cx="635" cy="442" r="5"/>
    <circle class="node" cx="1050" cy="442" r="5"/>
    <circle class="node" cx="1172" cy="442" r="5"/>
    <circle class="tankNode" cx="220" cy="328" r="5"/>
    <circle class="tankNode" cx="635" cy="328" r="5"/>
    <circle class="tankNode" cx="1050" cy="328" r="5"/>
  </g>

  <!-- Labels -->
  <text class="label" x="502" y="468">center_sill</text>
  <text class="label" x="245" y="398">bolster_beam</text>
  <text class="label" x="870" y="398">bolster_beam</text>
  <text class="label" x="660" y="386">middle_tank_lug</text>
  <text class="label" x="248" y="340">saddle_support</text>
  <text class="label" x="852" y="162">tank_ring</text>
  <text class="label" x="388" y="196">tank_longitudinal</text>

  <!-- Cross-section inset -->
  <g transform="translate(84 562)">
    <text class="small" x="0" y="-18">Cross-section: support and lateral-load path</text>
    <circle class="tank" cx="92" cy="62" r="56"/>
    <line class="tankThin" x1="36" y1="62" x2="148" y2="62"/>
    <line class="tankThin" x1="92" y1="6" x2="92" y2="118"/>
    <line class="interface" x1="72" y1="108" x2="46" y2="144"/>
    <line class="interface" x1="112" y1="108" x2="138" y2="144"/>
    <line class="frame" x1="32" y1="144" x2="152" y2="144"/>
    <line class="lateral" x1="154" y1="62" x2="204" y2="62"/>
    <circle class="tankNode" cx="92" cy="118" r="4"/>
  </g>

  <!-- Result boxes -->
  <g transform="translate(776 568)">
    <rect class="panel" x="0" y="0" width="392" height="82" rx="6"/>
    <text class="case" x="18" y="28">Result groups</text>
    <text class="small" x="18" y="52">underframe, tank lattice, interface, local equipment</text>
    <text class="small" x="18" y="72">N, Qy, Qz, Mx, My, Mz, support reactions</text>
  </g>

  <!-- Axes -->
  <line class="axis" x1="1086" y1="626" x2="1178" y2="626"/>
  <line class="axis" x1="1086" y1="626" x2="1086" y2="548"/>
  <text class="small" x="1190" y="631">x</text>
  <text class="small" x="1078" y="540">y</text>
</svg>

