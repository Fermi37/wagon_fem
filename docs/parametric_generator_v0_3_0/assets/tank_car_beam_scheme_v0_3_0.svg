<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Tank car beam scheme v0.3.0</title>
  <desc id="desc">Conceptual tank car beam topology with underframe, tank rings, longitudinal tank beams, saddle supports, and center sill.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#35424a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .frame { stroke: #27384a; stroke-width: 6; stroke-linecap: round; fill: none; }
      .frame-thin { stroke: #27384a; stroke-width: 3; stroke-linecap: round; fill: none; }
      .tank { stroke: #1f7a8c; stroke-width: 4; stroke-linecap: round; fill: none; }
      .tank-light { stroke: #79b7c3; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .support { stroke: #b23a48; stroke-width: 4; stroke-linecap: round; fill: none; }
      .node { fill: #ffffff; stroke: #27384a; stroke-width: 2; }
      .tank-node { fill: #ffffff; stroke: #1f7a8c; stroke-width: 2; }
      .label { font: 18px Arial, sans-serif; fill: #18222d; }
      .small { font: 15px Arial, sans-serif; fill: #35424a; }
      .caption { font: 20px Arial, sans-serif; font-weight: 700; fill: #18222d; }
      .axis { stroke: #657786; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620"/>

  <text class="caption" x="60" y="48">Tank car as a connected beam system</text>
  <text class="small" x="60" y="76">v0.3.0 topology: underframe, tank lattice, saddles, lugs, straps, and support nodes</text>

  <!-- Side view tank -->
  <ellipse class="tank-light" cx="600" cy="220" rx="455" ry="112"/>
  <line class="tank" x1="145" y1="220" x2="1055" y2="220"/>
  <line class="tank-light" x1="165" y1="155" x2="1035" y2="155"/>
  <line class="tank-light" x1="165" y1="285" x2="1035" y2="285"/>

  <!-- Tank rings in side projection -->
  <g>
    <line class="tank-light" x1="190" y1="116" x2="190" y2="324"/>
    <line class="tank-light" x1="310" y1="112" x2="310" y2="328"/>
    <line class="tank-light" x1="430" y1="110" x2="430" y2="330"/>
    <line class="tank-light" x1="550" y1="109" x2="550" y2="331"/>
    <line class="tank-light" x1="670" y1="109" x2="670" y2="331"/>
    <line class="tank-light" x1="790" y1="110" x2="790" y2="330"/>
    <line class="tank-light" x1="910" y1="112" x2="910" y2="328"/>
    <line class="tank-light" x1="1030" y1="116" x2="1030" y2="324"/>
  </g>

  <!-- Underframe -->
  <line class="frame" x1="90" y1="390" x2="1110" y2="390"/>
  <line class="frame-thin" x1="90" y1="425" x2="1110" y2="425"/>
  <line class="frame-thin" x1="90" y1="355" x2="1110" y2="355"/>
  <line class="frame" x1="205" y1="340" x2="205" y2="440"/>
  <line class="frame" x1="995" y1="340" x2="995" y2="440"/>
  <line class="frame-thin" x1="90" y1="340" x2="90" y2="440"/>
  <line class="frame-thin" x1="1110" y1="340" x2="1110" y2="440"/>
  <line class="frame-thin" x1="395" y1="355" x2="395" y2="425"/>
  <line class="frame-thin" x1="600" y1="355" x2="600" y2="425"/>
  <line class="frame-thin" x1="805" y1="355" x2="805" y2="425"/>

  <!-- Interface members -->
  <line class="support" x1="205" y1="300" x2="205" y2="355"/>
  <line class="support" x1="995" y1="300" x2="995" y2="355"/>
  <line class="support" x1="600" y1="300" x2="600" y2="390"/>
  <line class="support" x1="185" y1="280" x2="205" y2="355"/>
  <line class="support" x1="225" y1="280" x2="205" y2="355"/>
  <line class="support" x1="975" y1="280" x2="995" y2="355"/>
  <line class="support" x1="1015" y1="280" x2="995" y2="355"/>

  <!-- Nodes -->
  <g>
    <circle class="node" cx="90" cy="390" r="5"/>
    <circle class="node" cx="205" cy="390" r="5"/>
    <circle class="node" cx="600" cy="390" r="5"/>
    <circle class="node" cx="995" cy="390" r="5"/>
    <circle class="node" cx="1110" cy="390" r="5"/>
    <circle class="tank-node" cx="205" cy="300" r="5"/>
    <circle class="tank-node" cx="600" cy="300" r="5"/>
    <circle class="tank-node" cx="995" cy="300" r="5"/>
  </g>

  <!-- Cross-section inset -->
  <g transform="translate(770 465)">
    <text class="small" x="-8" y="-28">tank ring and angular generators</text>
    <circle class="tank" cx="90" cy="55" r="58"/>
    <line class="tank-light" x1="32" y1="55" x2="148" y2="55"/>
    <line class="tank-light" x1="90" y1="-3" x2="90" y2="113"/>
    <line class="tank-light" x1="49" y1="14" x2="131" y2="96"/>
    <line class="tank-light" x1="131" y1="14" x2="49" y2="96"/>
    <line class="support" x1="70" y1="101" x2="45" y2="138"/>
    <line class="support" x1="110" y1="101" x2="135" y2="138"/>
    <line class="frame" x1="28" y1="138" x2="152" y2="138"/>
    <circle class="tank-node" cx="90" cy="-3" r="4"/>
    <circle class="tank-node" cx="148" cy="55" r="4"/>
    <circle class="tank-node" cx="90" cy="113" r="4"/>
    <circle class="tank-node" cx="32" cy="55" r="4"/>
  </g>

  <!-- Labels -->
  <text class="label" x="86" y="475">end beam</text>
  <text class="label" x="510" y="474">center sill</text>
  <text class="label" x="170" y="335">bolster beam</text>
  <text class="label" x="925" y="335">bolster beam</text>
  <text class="label" x="620" y="350">middle lug</text>
  <text class="label" x="228" y="308">saddle support</text>
  <text class="label" x="832" y="135">tank rings</text>
  <text class="label" x="390" y="150">tank longitudinal beams</text>

  <!-- Axes -->
  <line class="axis" x1="70" y1="555" x2="170" y2="555"/>
  <line class="axis" x1="70" y1="555" x2="70" y2="475"/>
  <text class="small" x="180" y="561">x</text>
  <text class="small" x="62" y="468">y</text>
</svg>

