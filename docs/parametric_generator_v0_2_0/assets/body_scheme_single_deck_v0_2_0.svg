<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">Single-deck passenger-car beam model aligned with KRV chapter 11</title>
  <desc id="desc">Corrected single-deck passenger-car beam model with side-wall belts, inter-window posts, opening boundary post segments, variable center sill zones, bolster lines, and a cylindrical roof bow shown only in cross section.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #1e293b; }
      .label { font-family: Arial, sans-serif; font-size: 15px; fill: #1e293b; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .tiny { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
      .center { stroke: #0f766e; stroke-width: 8; stroke-linecap: round; }
      .side { stroke: #2563eb; stroke-width: 6; stroke-linecap: round; }
      .cross { stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; }
      .post { stroke: #dc2626; stroke-width: 5; stroke-linecap: round; }
      .belt { stroke: #ea580c; stroke-width: 5; stroke-linecap: round; }
      .roof { stroke: #0891b2; stroke-width: 5; stroke-linecap: round; }
      .tie { stroke: #64748b; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 8; }
      .opening { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .endzone { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .dimension { stroke: #64748b; stroke-width: 2; marker-start: url(#arrowDim); marker-end: url(#arrowDim); }
      .axis { stroke: #0f172a; stroke-width: 3; marker-end: url(#arrowDark); }
    </style>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,5 L9,1 L7,5 L9,9 Z" fill="#64748b" />
    </marker>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f172a" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="980" />
  <text class="title" x="55" y="55">Single-Deck Passenger-Car Beam Model</text>
  <text class="small" x="55" y="86">Corrected topology from KRV chapter 11: side belts and posts are shown in side view; roof-bow geometry is shown in cross section.</text>

  <rect class="panel" x="40" y="120" width="1080" height="780" rx="8" />
  <text class="subtitle" x="75" y="160">Side-wall and underframe scheme in the x-y plane</text>

  <line class="axis" x1="90" y1="840" x2="205" y2="840" />
  <line class="axis" x1="90" y1="840" x2="90" y2="735" />
  <text class="label" x="214" y="845">x</text>
  <text class="label" x="81" y="725">y</text>

  <line class="dimension" x1="205" y1="210" x2="1005" y2="210" />
  <text class="label" x="574" y="198">L = 24537</text>

  <rect class="endzone" x="205" y="455" width="105" height="350" rx="4" />
  <rect class="endzone" x="900" y="455" width="105" height="350" rx="4" />

  <line class="side" x1="205" y1="805" x2="1005" y2="805" />
  <line class="belt" x1="205" y1="725" x2="1005" y2="725" />
  <line class="belt" x1="205" y1="640" x2="1005" y2="640" />
  <line class="belt" x1="205" y1="540" x2="1005" y2="540" />
  <line class="belt" x1="205" y1="455" x2="1005" y2="455" />
  <line class="roof" x1="205" y1="425" x2="1005" y2="425" />

  <g id="window-openings">
    <rect class="opening" x="350" y="552" width="72" height="76" rx="4" />
    <rect class="opening" x="455" y="552" width="72" height="76" rx="4" />
    <rect class="opening" x="560" y="552" width="72" height="76" rx="4" />
    <rect class="opening" x="665" y="552" width="72" height="76" rx="4" />
    <rect class="opening" x="770" y="552" width="72" height="76" rx="4" />
  </g>

  <g id="side-posts">
    <line class="post" x1="205" y1="455" x2="205" y2="805" />
    <line class="post" x1="310" y1="455" x2="310" y2="805" />
    <line class="post" x1="350" y1="455" x2="350" y2="552" />
    <line class="post" x1="350" y1="628" x2="350" y2="805" />
    <line class="post" x1="422" y1="455" x2="422" y2="552" />
    <line class="post" x1="422" y1="628" x2="422" y2="805" />
    <line class="post" x1="455" y1="455" x2="455" y2="805" />
    <line class="post" x1="527" y1="455" x2="527" y2="552" />
    <line class="post" x1="527" y1="628" x2="527" y2="805" />
    <line class="post" x1="560" y1="455" x2="560" y2="805" />
    <line class="post" x1="632" y1="455" x2="632" y2="552" />
    <line class="post" x1="632" y1="628" x2="632" y2="805" />
    <line class="post" x1="665" y1="455" x2="665" y2="805" />
    <line class="post" x1="737" y1="455" x2="737" y2="552" />
    <line class="post" x1="737" y1="628" x2="737" y2="805" />
    <line class="post" x1="770" y1="455" x2="770" y2="805" />
    <line class="post" x1="842" y1="455" x2="842" y2="552" />
    <line class="post" x1="842" y1="628" x2="842" y2="805" />
    <line class="post" x1="900" y1="455" x2="900" y2="805" />
    <line class="post" x1="1005" y1="455" x2="1005" y2="805" />
  </g>

  <g id="underframe">
    <line class="cross" x1="320" y1="805" x2="320" y2="725" />
    <line class="cross" x1="900" y1="805" x2="900" y2="725" />
    <line class="center" x1="205" y1="842" x2="320" y2="842" />
    <line class="center" x1="320" y1="858" x2="900" y2="858" />
    <line class="center" x1="900" y1="842" x2="1005" y2="842" />
    <line class="tie" x1="320" y1="805" x2="370" y2="725" />
    <line class="tie" x1="900" y1="805" x2="842" y2="725" />
  </g>

  <text class="tiny" x="436" y="530">window belt: opening frames and inter-window posts</text>
  <text class="tiny" x="222" y="445">roof side rail in side view</text>
  <text class="tiny" x="214" y="825">side sill and lower side-wall belt</text>
  <text class="tiny" x="370" y="880">variable center sill: heavy end zones, transition zones, middle span</text>
  <text class="tiny" x="303" y="712">bolster line</text>
  <text class="tiny" x="878" y="712">bolster line</text>
  <text class="tiny" x="226" y="785">end/service zone</text>
  <text class="tiny" x="910" y="785">end/service zone</text>

  <rect class="panel" x="1170" y="120" width="470" height="780" rx="8" />
  <text class="subtitle" x="1205" y="160">Cross section in the y-z plane</text>

  <line class="axis" x1="1230" y1="830" x2="1335" y2="830" />
  <line class="axis" x1="1230" y1="830" x2="1230" y2="725" />
  <text class="label" x="1344" y="835">z</text>
  <text class="label" x="1221" y="715">y</text>

  <line class="dimension" x1="1285" y1="780" x2="1535" y2="780" />
  <text class="label" x="1379" y="768">B = 3105</text>

  <line class="cross" x1="1285" y1="735" x2="1535" y2="735" />
  <line class="center" x1="1410" y1="760" x2="1410" y2="760" />
  <line class="post" x1="1285" y1="735" x2="1285" y2="470" />
  <line class="post" x1="1535" y1="735" x2="1535" y2="470" />
  <line class="belt" x1="1285" y1="640" x2="1535" y2="640" />
  <line class="belt" x1="1285" y1="540" x2="1535" y2="540" />
  <line class="belt" x1="1285" y1="470" x2="1535" y2="470" />
  <line class="roof" x1="1285" y1="470" x2="1320" y2="432" />
  <line class="roof" x1="1320" y1="432" x2="1365" y2="408" />
  <line class="roof" x1="1365" y1="408" x2="1455" y2="408" />
  <line class="roof" x1="1455" y1="408" x2="1500" y2="432" />
  <line class="roof" x1="1500" y1="432" x2="1535" y2="470" />

  <circle class="node" cx="1285" cy="735" r="5" />
  <circle class="node" cx="1535" cy="735" r="5" />
  <circle class="node" cx="1285" cy="470" r="5" />
  <circle class="node" cx="1535" cy="470" r="5" />
  <circle class="node" cx="1320" cy="432" r="5" />
  <circle class="node" cx="1365" cy="408" r="5" />
  <circle class="node" cx="1455" cy="408" r="5" />
  <circle class="node" cx="1500" cy="432" r="5" />
  <text class="tiny" x="1325" y="392">segmented cylindrical roof bow</text>
  <text class="tiny" x="1335" y="625">side-wall belts</text>
</svg>
