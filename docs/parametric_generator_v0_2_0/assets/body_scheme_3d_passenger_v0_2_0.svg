<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1180" viewBox="0 0 1700 1180" role="img" aria-labelledby="title desc">
  <title id="title">3D projections of passenger-car body beam schemes</title>
  <desc id="desc">Editable SVG with two schematic isometric projections: a single-deck passenger-car beam frame and a double-deck passenger-car beam frame with interdeck beams and lowered floor.</desc>
