  <line class="roof" x1="1310" y1="395" x2="1355" y2="330" />
  <line class="roof" x1="1355" y1="330" x2="1495" y2="330" />
  <line class="roof" x1="1495" y1="330" x2="1540" y2="395" />

  <text class="tiny" x="1360" y="610">interdeck</text>
  <text class="tiny" x="1355" y="312">Tpr roof envelope</text>
