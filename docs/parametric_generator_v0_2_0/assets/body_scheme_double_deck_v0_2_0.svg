<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120" role="img" aria-labelledby="title desc">
  <title id="title">Double-deck passenger-car beam model 61-4465</title>
  <desc id="desc">Double-deck beam model for passenger car 61-4465 with first-floor beams, interdeck beams, second-floor side-wall belts, two side-window rows, lowered central floor, stairwell frames, end transition zones, and Tpr roof envelope.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .bodyfill { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .title { font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #1e293b; }
      .label { font-family: Arial, sans-serif; font-size: 15px; fill: #1e293b; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .tiny { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
      .center { stroke: #0f766e; stroke-width: 8; stroke-linecap: round; }
      .side { stroke: #2563eb; stroke-width: 6; stroke-linecap: round; }
      .cross { stroke: #7c3aed; stroke-width: 5; stroke-linecap: round; }
      .post { stroke: #dc2626; stroke-width: 5; stroke-linecap: round; }
      .belt { stroke: #ea580c; stroke-width: 5; stroke-linecap: round; }
      .roof { stroke: #0891b2; stroke-width: 5; stroke-linecap: round; }
      .interdeck { stroke: #16a34a; stroke-width: 6; stroke-linecap: round; }
      .lowered { stroke: #475569; stroke-width: 5; stroke-linecap: round; }
      .tie { stroke: #64748b; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 8; }
      .opening { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .stair { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 8 6; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .dimension { stroke: #64748b; stroke-width: 2; marker-start: url(#arrowDim); marker-end: url(#arrowDim); }
      .axis { stroke: #0f172a; stroke-width: 3; marker-end: url(#arrowDark); }
    </style>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,5 L9,1 L7,5 L9,9 Z" fill="#64748b" />
    </marker>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f172a" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1120" />
  <text class="title" x="55" y="55">Double-Deck Passenger-Car Beam Model 61-4465</text>
  <text class="small" x="55" y="86">Primary topology for the 61-4465 body: two passenger levels, interdeck structure, lowered central first floor, and end stair/service zones.</text>

  <rect class="panel" x="40" y="120" width="1135" height="920" rx="8" />
  <text class="subtitle" x="75" y="160">Side-wall, interdeck, and underframe scheme in the x-y plane</text>

  <line class="axis" x1="90" y1="975" x2="205" y2="975" />
  <line class="axis" x1="90" y1="975" x2="90" y2="870" />
  <text class="label" x="214" y="980">x</text>
  <text class="label" x="81" y="860">y</text>

