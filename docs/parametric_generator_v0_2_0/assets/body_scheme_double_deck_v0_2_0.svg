    <line class="post" x1="594" y1="746" x2="594" y2="880" />
    <line class="post" x1="614" y1="360" x2="614" y2="880" />
    <line class="post" x1="672" y1="360" x2="672" y2="448" />
    <line class="post" x1="672" y1="506" x2="672" y2="688" />
    <line class="post" x1="672" y1="746" x2="672" y2="880" />
    <line class="post" x1="692" y1="360" x2="692" y2="880" />
    <line class="post" x1="750" y1="360" x2="750" y2="448" />
    <line class="post" x1="750" y1="506" x2="750" y2="688" />
    <line class="post" x1="750" y1="746" x2="750" y2="880" />
    <line class="post" x1="770" y1="360" x2="770" y2="880" />
