    <line class="post" x1="828" y1="746" x2="828" y2="880" />
    <line class="post" x1="905" y1="360" x2="905" y2="880" />
    <line class="post" x1="1015" y1="360" x2="1015" y2="880" />
    <line class="post" x1="1050" y1="360" x2="1050" y2="880" />
