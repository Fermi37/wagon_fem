  <text class="tiny" x="430" y="666">first-floor window row</text>
  <text class="tiny" x="405" y="930">lowered central first-floor beam line</text>
  <text class="tiny" x="430" y="590">interdeck structural line</text>
  <text class="tiny" x="292" y="286">Tpr roof envelope line</text>
  <text class="tiny" x="292" y="850">bolster / underframe load-transfer zone</text>

  <rect class="panel" x="1220" y="120" width="420" height="920" rx="8" />
